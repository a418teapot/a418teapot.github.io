<!DOCTYPE html>
<html>
<head>
<style>
#customers {
  font-family: Arial, Helvetica, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

#customers td, #customers th {
  border: 1px solid #ddd;
  padding: 8px;
}

#customers tr:nth-child(even){background-color: #f2f2f2;}

#customers tr:hover {background-color: #ddd;}

#customers th {
  padding-top: 12px;
  padding-bottom: 12px;
  text-align: left;
  background-color: #7caac6;
  color: white;
}
</style>
</head>
<body>
<table id="customers">
<tr><th>玩家名称</th><th>本服游玩时长</th><th>爆头率</th><th>普通感染者击杀</th><th>特感击杀</th><th>witch击杀</th><th>坦克击杀</th><th>黑枪</th><th>被黑枪</th><th>完成战役</th><th>团灭</th><th>触发警报</th></tr>
</table>
</body>
</html>
